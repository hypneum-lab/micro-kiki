# kicad-dsl — rank 8, seq 2048, 500 iters
model: models/qwen3.5-35b-a3b
fine_tune_type: lora
grad_checkpoint: true
save_every: 100
steps_per_report: 10
steps_per_eval: 100
val_batches: 25
train: true
seed: 42
clear_cache_threshold: 50000000000
lora_parameters:
  rank: 8
  alpha: 16
  dropout: 0.0
  scale: 2.0
  keys:
  - self_attn.q_proj
  - self_attn.k_proj
  - self_attn.v_proj
  - self_attn.o_proj
num_layers: 40
learning_rate: 3.0e-05
batch_size: 1
grad_accumulation_steps: 4
iters: 500
max_seq_length: 2048
