# micro-kiki MLX LoRA — complements
# Domains: math, security
# Rank 12, seq 4096, 400 iters

model: models/qwen3.5-35b-a3b
fine_tune_type: lora
lora_parameters:
  dropout: 0.0
  scale: 2.0
  keys:
  - self_attn.q_proj
  - self_attn.k_proj
  - self_attn.v_proj
  - self_attn.o_proj
  rank: 12
  alpha: 24
num_layers: 40
grad_checkpoint: true
save_every: 100
steps_per_report: 10
steps_per_eval: 100
val_batches: 25
train: true
seed: 42
learning_rate: 3.0e-05
max_seq_length: 4096
batch_size: 1
grad_accumulation_steps: 4
iters: 400
lr_schedule:
  name: cosine_decay
  warmup: 40
  arguments:
  - 400
  - 1.0e-06
